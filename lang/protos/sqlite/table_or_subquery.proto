syntax = "proto3";

package sqlite;

message TableOrSubquery {
  oneof value {
    Seq1 seq1 = 1;

    Seq2 seq2 = 2;

    LeftParenthesis left_parenthesis = 3;

    LeftParenthesis2 left_parenthesis2 = 4;

    LeftParenthesis3 left_parenthesis3 = 5;
  }

  message Seq1 {
    Seq1 seq1 = 1;

    TableName table_name = 2;

    Seq2 seq2 = 3;

    Alt1 alt1 = 4;

    message Seq1 {
      SchemaName schema_name = 1;

      FullStopKeyword full_stop_keyword = 2;
    }

    message Seq2 {
      AsKeyword as_keyword = 1;

      TableAlias table_alias = 2;
    }

    message Alt1 {
      oneof value {
        IndexedBy indexed_by = 1;

        NotIndexed not_indexed = 2;
      }

      message IndexedBy {
        IndexName index_name = 1;
      }

      message NotIndexed {
      }
    }
  }

  message Seq2 {
    Seq1 seq1 = 1;

    TableFunctionName table_function_name = 2;

    LeftParenthesisKeyword left_parenthesis_keyword = 3;

    Seq2 seq2 = 4;

    RightParenthesisKeyword right_parenthesis_keyword = 5;

    Seq3 seq3 = 6;

    message Seq1 {
      SchemaName schema_name = 1;

      FullStopKeyword full_stop_keyword = 2;
    }

    message Seq2 {
      repeated Expr expr = 1;
    }

    message Seq3 {
      AsKeyword as_keyword = 1;

      TableAlias table_alias = 2;
    }
  }

  message LeftParenthesis {
    SelectStmt select_stmt = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;
  }

  message LeftParenthesis2 {
    repeated TableOrSubquery table_or_subquery = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;
  }

  message LeftParenthesis3 {
    JoinClause join_clause = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;
  }
}
