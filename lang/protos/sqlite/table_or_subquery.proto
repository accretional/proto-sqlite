syntax = "proto3";

package sqlite;

message TableOrSubquery {
  oneof value {
    Seq1 seq1 = 1;

    Seq2 seq2 = 2;

    Seq3 seq3 = 3;

    Seq4 seq4 = 4;

    Seq5 seq5 = 5;
  }

  message Seq1 {
    Seq1 seq1 = 1;

    TableName table_name = 2;

    Seq2 seq2 = 3;

    Alt1 alt1 = 4;

    message Seq1 {
      SchemaName schema_name = 1;

      FullStopKeyword full_stop_keyword = 2;
    }

    message Seq2 {
      AsKeyword as_keyword = 1;

      TableAlias table_alias = 2;
    }

    message Alt1 {
      oneof value {
        Seq1 seq1 = 1;

        Seq2 seq2 = 2;
      }

      message Seq1 {
        IndexedKeyword indexed_keyword = 1;

        ByKeyword by_keyword = 2;

        IndexName index_name = 3;
      }

      message Seq2 {
        NotKeyword not_keyword = 1;

        IndexedKeyword indexed_keyword = 2;
      }
    }
  }

  message Seq2 {
    Seq1 seq1 = 1;

    TableFunctionName table_function_name = 2;

    LeftParenthesisKeyword left_parenthesis_keyword = 3;

    Seq2 seq2 = 4;

    RightParenthesisKeyword right_parenthesis_keyword = 5;

    Seq3 seq3 = 6;

    message Seq1 {
      SchemaName schema_name = 1;

      FullStopKeyword full_stop_keyword = 2;
    }

    message Seq2 {
      repeated Expr expr = 1;
    }

    message Seq3 {
      AsKeyword as_keyword = 1;

      TableAlias table_alias = 2;
    }
  }

  message Seq3 {
    LeftParenthesisKeyword left_parenthesis_keyword = 1;

    SelectStmt select_stmt = 2;

    RightParenthesisKeyword right_parenthesis_keyword = 3;
  }

  message Seq4 {
    LeftParenthesisKeyword left_parenthesis_keyword = 1;

    repeated TableOrSubquery table_or_subquery = 2;

    RightParenthesisKeyword right_parenthesis_keyword = 3;
  }

  message Seq5 {
    LeftParenthesisKeyword left_parenthesis_keyword = 1;

    JoinClause join_clause = 2;

    RightParenthesisKeyword right_parenthesis_keyword = 3;
  }
}
