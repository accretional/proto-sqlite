syntax = "proto3";

package sqlite;

message CreateTableStmt {
  Alt1 alt1 = 1;

  TableKeyword table_keyword = 2;

  IfNotExists if_not_exists = 3;

  Seq1 seq1 = 4;

  TableName table_name = 5;

  Alt2 alt2 = 6;

  message Alt1 {
    oneof value {
      TempKeyword temp_keyword = 1;

      TemporaryKeyword temporary_keyword = 2;
    }
  }

  message IfNotExists {
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt2 {
    oneof value {
      As as = 1;

      LeftParenthesis left_parenthesis = 2;
    }

    message As {
      SelectStmt select_stmt = 1;
    }

    message LeftParenthesis {
      repeated ColumnDef column_def = 1;

      repeated Comma comma = 2;

      RightParenthesisKeyword right_parenthesis_keyword = 3;

      TableOptions table_options = 4;

      message Comma {
        TableConstraint table_constraint = 1;
      }
    }
  }
}
