syntax = "proto3";

package sqlite;

message IndexedColumn {
  Alt1 alt1 = 1;

  Collate collate = 2;

  Alt2 alt2 = 3;

  message Alt1 {
    oneof value {
      ColumnName column_name = 1;

      Expr expr = 2;
    }
  }

  message Collate {
    CollationName collation_name = 1;
  }

  message Alt2 {
    oneof value {
      AscKeyword asc_keyword = 1;

      DescKeyword desc_keyword = 2;
    }
  }
}
