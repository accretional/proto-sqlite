syntax = "proto3";

package sqlite;

message SelectCore {
  oneof value {
    Select select = 1;

    ValuesLeftParenthesis values_left_parenthesis = 2;
  }

  message Select {
    Alt1 alt1 = 1;

    repeated ResultColumn result_column = 2;

    From from = 3;

    Where where = 4;

    GroupBy group_by = 5;

    Window window = 6;

    message Alt1 {
      oneof value {
        DistinctKeyword distinct_keyword = 1;

        AllKeyword all_keyword = 2;
      }
    }

    message From {
      Alt1 alt1 = 1;

      message Alt1 {
        oneof value {
          Seq1 seq1 = 1;

          JoinClause join_clause = 2;
        }

        message Seq1 {
          repeated TableOrSubquery table_or_subquery = 1;
        }
      }
    }

    message Where {
      Expr expr = 1;
    }

    message GroupBy {
      repeated Expr expr = 1;

      Having having = 2;

      message Having {
        Expr expr = 1;
      }
    }

    message Window {
      WindowName window_name = 1;

      AsKeyword as_keyword = 2;

      WindowDefn window_defn = 3;

      repeated Comma comma = 4;

      message Comma {
        WindowName window_name = 1;

        AsKeyword as_keyword = 2;

        WindowDefn window_defn = 3;
      }
    }
  }

  message ValuesLeftParenthesis {
    repeated Expr expr = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;

    repeated CommaLeftParenthesis comma_left_parenthesis = 3;

    message CommaLeftParenthesis {
      repeated Expr expr = 1;

      RightParenthesisKeyword right_parenthesis_keyword = 2;
    }
  }
}
