syntax = "proto3";

package sqlite;

message JoinConstraint {
  oneof value {
    On on = 1;

    UsingLeftParenthesis using_left_parenthesis = 2;
  }

  message On {
    Expr expr = 1;
  }

  message UsingLeftParenthesis {
    repeated ColumnName column_name = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;
  }
}
