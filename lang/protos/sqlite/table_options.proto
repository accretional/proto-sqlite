syntax = "proto3";

package sqlite;

message TableOptions {
  oneof value {
    WithoutRowid without_rowid = 1;

    StrictKeyword strict_keyword = 2;

    WithoutRowidCommaStrict without_rowid_comma_strict = 3;

    StrictCommaWithoutRowid strict_comma_without_rowid = 4;
  }

  message WithoutRowid {
  }

  message WithoutRowidCommaStrict {
  }

  message StrictCommaWithoutRowid {
  }
}
