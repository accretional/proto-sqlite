syntax = "proto3";

package sqlite;

message NumericLiteral {
  Digit digit = 1;

  repeated Digit digit_2 = 2;

  FullStop full_stop = 3;

  E e = 4;

  message FullStop {
    repeated Digit digit = 1;
  }

  message E {
    Alt1 alt1 = 1;

    Digit digit = 2;

    repeated Digit digit_2 = 3;

    message Alt1 {
      oneof value {
        PlusSignKeyword plus_sign_keyword = 1;

        HyphenMinusKeyword hyphen_minus_keyword = 2;
      }
    }
  }
}
