syntax = "proto3";

package sqlite;

message DeleteStmt {
  With with = 1;

  DeleteKeyword delete_keyword = 2;

  FromKeyword from_keyword = 3;

  QualifiedTableName qualified_table_name = 4;

  Where where = 5;

  ReturningClause returning_clause = 6;

  message With {
    RecursiveKeyword recursive_keyword = 1;

    repeated CommonTableExpression common_table_expression = 2;
  }

  message Where {
    Expr expr = 1;
  }
}
