syntax = "proto3";

package sqlite;

message OrderingTerm {
  Expr expr = 1;

  Collate collate = 2;

  Alt1 alt1 = 3;

  Alt2 alt2 = 4;

  message Collate {
    CollationName collation_name = 1;
  }

  message Alt1 {
    oneof value {
      AscKeyword asc_keyword = 1;

      DescKeyword desc_keyword = 2;
    }
  }

  message Alt2 {
    oneof value {
      NullsFirst nulls_first = 1;

      NullsLast nulls_last = 2;
    }

    message NullsFirst {
    }

    message NullsLast {
    }
  }
}
