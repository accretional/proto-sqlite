syntax = "proto3";

package sqlite;

message ColumnConstraint {
  Constraint constraint = 1;

  Alt1 alt1 = 2;

  message Constraint {
    Name name = 1;
  }

  message Alt1 {
    oneof value {
      PrimaryKey primary_key = 1;

      NotNull not_null = 2;

      Unique unique = 3;

      CheckLeftParenthesis check_left_parenthesis = 4;

      Default default = 5;

      Collate collate = 6;

      ForeignKeyClause foreign_key_clause = 7;

      Seq1 seq1 = 8;
    }

    message PrimaryKey {
      Alt1 alt1 = 1;

      ConflictClause conflict_clause = 2;

      AutoincrementKeyword autoincrement_keyword = 3;

      message Alt1 {
        oneof value {
          AscKeyword asc_keyword = 1;

          DescKeyword desc_keyword = 2;
        }
      }
    }

    message NotNull {
      ConflictClause conflict_clause = 1;
    }

    message Unique {
      ConflictClause conflict_clause = 1;
    }

    message CheckLeftParenthesis {
      Expr expr = 1;

      RightParenthesisKeyword right_parenthesis_keyword = 2;
    }

    message Default {
      Alt1 alt1 = 1;

      message Alt1 {
        oneof value {
          LeftParenthesis left_parenthesis = 1;

          LiteralValue literal_value = 2;

          SignedNumber signed_number = 3;
        }

        message LeftParenthesis {
          Expr expr = 1;

          RightParenthesisKeyword right_parenthesis_keyword = 2;
        }
      }
    }

    message Collate {
      CollationName collation_name = 1;
    }

    message Seq1 {
      GeneratedAlways generated_always = 1;

      AsKeyword as_keyword = 2;

      LeftParenthesisKeyword left_parenthesis_keyword = 3;

      Expr expr = 4;

      RightParenthesisKeyword right_parenthesis_keyword = 5;

      Alt1 alt1 = 6;

      message GeneratedAlways {
      }

      message Alt1 {
        oneof value {
          StoredKeyword stored_keyword = 1;

          VirtualKeyword virtual_keyword = 2;
        }
      }
    }
  }
}
