syntax = "proto3";

package sqlite;

message ColumnConstraint {
  Constraint constraint = 1;

  Alt1 alt1 = 2;

  message Constraint {
    ConstraintKeyword constraint_keyword = 1;

    Name name = 2;
  }

  message Alt1 {
    oneof value {
      PrimaryKey primary_key = 1;

      NotNull not_null = 2;

      Unique unique = 3;

      CheckLeftParenthesis check_left_parenthesis = 4;

      Default default = 5;

      Collate collate = 6;

      ForeignKeyClause foreign_key_clause = 7;

      Seq1 seq1 = 8;
    }

    message PrimaryKey {
      PrimaryKeyword primary_keyword = 1;

      KeyKeyword key_keyword = 2;

      Alt1 alt1 = 3;

      ConflictClause conflict_clause = 4;

      AutoincrementKeyword autoincrement_keyword = 5;

      message Alt1 {
        oneof value {
          AscKeyword asc_keyword = 1;

          DescKeyword desc_keyword = 2;
        }
      }
    }

    message NotNull {
      NotKeyword not_keyword = 1;

      NullKeyword null_keyword = 2;

      ConflictClause conflict_clause = 3;
    }

    message Unique {
      UniqueKeyword unique_keyword = 1;

      ConflictClause conflict_clause = 2;
    }

    message CheckLeftParenthesis {
      CheckKeyword check_keyword = 1;

      LeftParenthesisKeyword left_parenthesis_keyword = 2;

      Expr expr = 3;

      RightParenthesisKeyword right_parenthesis_keyword = 4;
    }

    message Default {
      DefaultKeyword default_keyword = 1;

      Alt1 alt1 = 2;

      message Alt1 {
        oneof value {
          LeftParenthesis left_parenthesis = 1;

          LiteralValue literal_value = 2;

          SignedNumber signed_number = 3;
        }

        message LeftParenthesis {
          LeftParenthesisKeyword left_parenthesis_keyword = 1;

          Expr expr = 2;

          RightParenthesisKeyword right_parenthesis_keyword = 3;
        }
      }
    }

    message Collate {
      CollateKeyword collate_keyword = 1;

      CollationName collation_name = 2;
    }

    message Seq1 {
      GeneratedAlways generated_always = 1;

      AsKeyword as_keyword = 2;

      LeftParenthesisKeyword left_parenthesis_keyword = 3;

      Expr expr = 4;

      RightParenthesisKeyword right_parenthesis_keyword = 5;

      Alt1 alt1 = 6;

      message GeneratedAlways {
        GeneratedKeyword generated_keyword = 1;

        AlwaysKeyword always_keyword = 2;
      }

      message Alt1 {
        oneof value {
          StoredKeyword stored_keyword = 1;

          VirtualKeyword virtual_keyword = 2;
        }
      }
    }
  }
}
