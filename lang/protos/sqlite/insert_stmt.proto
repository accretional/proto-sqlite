syntax = "proto3";

package sqlite;

message InsertStmt {
  Seq1 seq1 = 1;

  Alt1 alt1 = 2;

  IntoKeyword into_keyword = 3;

  Seq2 seq2 = 4;

  TableName table_name = 5;

  Seq3 seq3 = 6;

  Seq4 seq4 = 7;

  Alt2 alt2 = 8;

  ReturningClause returning_clause = 9;

  message Seq1 {
    WithKeyword with_keyword = 1;

    RecursiveKeyword recursive_keyword = 2;

    CommonTableExpression common_table_expression = 3;

    repeated Seq1 seq1 = 4;

    message Seq1 {
      CommaKeyword comma_keyword = 1;

      CommonTableExpression common_table_expression = 2;
    }
  }

  message Alt1 {
    oneof value {
      ReplaceKeyword replace_keyword = 1;

      InsertKeyword insert_keyword = 2;

      Seq1 seq1 = 3;
    }

    message Seq1 {
      InsertKeyword insert_keyword = 1;

      OrKeyword or_keyword = 2;

      Alt1 alt1 = 3;

      message Alt1 {
        oneof value {
          AbortKeyword abort_keyword = 1;

          FailKeyword fail_keyword = 2;

          IgnoreKeyword ignore_keyword = 3;

          ReplaceKeyword replace_keyword = 4;

          RollbackKeyword rollback_keyword = 5;
        }
      }
    }
  }

  message Seq2 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Seq3 {
    AsKeyword as_keyword = 1;

    Alias alias = 2;
  }

  message Seq4 {
    LeftParenthesisKeyword left_parenthesis_keyword = 1;

    ColumnName column_name = 2;

    repeated Seq1 seq1 = 3;

    RightParenthesisKeyword right_parenthesis_keyword = 4;

    message Seq1 {
      CommaKeyword comma_keyword = 1;

      ColumnName column_name = 2;
    }
  }

  message Alt2 {
    oneof value {
      Seq1 seq1 = 1;

      Seq2 seq2 = 2;

      Seq3 seq3 = 3;
    }

    message Seq1 {
      ValuesKeyword values_keyword = 1;

      LeftParenthesisKeyword left_parenthesis_keyword = 2;

      Expr expr = 3;

      repeated Seq1 seq1 = 4;

      RightParenthesisKeyword right_parenthesis_keyword = 5;

      repeated Seq2 seq2 = 6;

      UpsertClause upsert_clause = 7;

      message Seq1 {
        CommaKeyword comma_keyword = 1;

        Expr expr = 2;
      }

      message Seq2 {
        CommaKeyword comma_keyword = 1;

        LeftParenthesisKeyword left_parenthesis_keyword = 2;

        Expr expr = 3;

        repeated Seq1 seq1 = 4;

        RightParenthesisKeyword right_parenthesis_keyword = 5;

        message Seq1 {
          CommaKeyword comma_keyword = 1;

          Expr expr = 2;
        }
      }
    }

    message Seq2 {
      SelectStmt select_stmt = 1;

      UpsertClause upsert_clause = 2;
    }

    message Seq3 {
      DefaultKeyword default_keyword = 1;

      ValuesKeyword values_keyword = 2;
    }
  }
}
