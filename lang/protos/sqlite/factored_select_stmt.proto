syntax = "proto3";

package sqlite;

message FactoredSelectStmt {
  With with = 1;

  SelectCore select_core = 2;

  repeated Seq1 seq1 = 3;

  OrderBy order_by = 4;

  Limit limit = 5;

  message With {
    RecursiveKeyword recursive_keyword = 1;

    repeated CommonTableExpression common_table_expression = 2;
  }

  message Seq1 {
    CompoundOperator compound_operator = 1;

    SelectCore select_core = 2;
  }

  message OrderBy {
    repeated OrderingTerm ordering_term = 1;
  }

  message Limit {
    Expr expr = 1;

    Alt1 alt1 = 2;

    message Alt1 {
      oneof value {
        Offset offset = 1;

        Comma comma = 2;
      }

      message Offset {
        Expr expr = 1;
      }

      message Comma {
        Expr expr = 1;
      }
    }
  }
}
