syntax = "proto3";

package sqlite;

message ConflictClause {
  OnConflict on_conflict = 1;

  message OnConflict {
    Alt1 alt1 = 1;

    message Alt1 {
      oneof value {
        RollbackKeyword rollback_keyword = 1;

        AbortKeyword abort_keyword = 2;

        FailKeyword fail_keyword = 3;

        IgnoreKeyword ignore_keyword = 4;

        ReplaceKeyword replace_keyword = 5;
      }
    }
  }
}
