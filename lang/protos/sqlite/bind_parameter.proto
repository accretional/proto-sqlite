syntax = "proto3";

package sqlite;

message BindParameter {
  oneof value {
    QuestionMarkKeyword question_mark_keyword = 1;

    Colon colon = 2;

    CommercialAt commercial_at = 3;

    DollarSign dollar_sign = 4;
  }

  message Colon {
    Name name = 1;
  }

  message CommercialAt {
    Name name = 1;
  }

  message DollarSign {
    Name name = 1;
  }
}
