syntax = "proto3";

package sqlite;

message BindParameter {
  oneof value {
    QuestionMarkKeyword question_mark_keyword = 1;

    Colon colon = 2;

    CommercialAt commercial_at = 3;

    DollarSign dollar_sign = 4;
  }

  message Colon {
    ColonKeyword colon_keyword = 1;

    Name name = 2;
  }

  message CommercialAt {
    CommercialAtKeyword commercial_at_keyword = 1;

    Name name = 2;
  }

  message DollarSign {
    DollarSignKeyword dollar_sign_keyword = 1;

    Name name = 2;
  }
}
