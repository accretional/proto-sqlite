syntax = "proto3";

package sqlite;

message TableConstraint {
  Constraint constraint = 1;

  Alt1 alt1 = 2;

  message Constraint {
    Name name = 1;
  }

  message Alt1 {
    oneof value {
      PrimaryKeyLeftParenthesis primary_key_left_parenthesis = 1;

      UniqueLeftParenthesis unique_left_parenthesis = 2;

      CheckLeftParenthesis check_left_parenthesis = 3;

      ForeignKeyLeftParenthesis foreign_key_left_parenthesis = 4;
    }

    message PrimaryKeyLeftParenthesis {
      repeated IndexedColumn indexed_column = 1;

      RightParenthesisKeyword right_parenthesis_keyword = 2;

      ConflictClause conflict_clause = 3;
    }

    message UniqueLeftParenthesis {
      repeated IndexedColumn indexed_column = 1;

      RightParenthesisKeyword right_parenthesis_keyword = 2;

      ConflictClause conflict_clause = 3;
    }

    message CheckLeftParenthesis {
      Expr expr = 1;

      RightParenthesisKeyword right_parenthesis_keyword = 2;
    }

    message ForeignKeyLeftParenthesis {
      repeated ColumnName column_name = 1;

      RightParenthesisKeyword right_parenthesis_keyword = 2;

      ForeignKeyClause foreign_key_clause = 3;
    }
  }
}
