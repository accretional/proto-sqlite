syntax = "proto3";

package sqlite;

message TableConstraint {
  Seq1 seq1 = 1;

  Alt1 alt1 = 2;

  message Seq1 {
    ConstraintKeyword constraint_keyword = 1;

    Name name = 2;
  }

  message Alt1 {
    oneof value {
      Seq1 seq1 = 1;

      Seq2 seq2 = 2;

      Seq3 seq3 = 3;

      Seq4 seq4 = 4;
    }

    message Seq1 {
      PrimaryKeyword primary_keyword = 1;

      KeyKeyword key_keyword = 2;

      LeftParenthesisKeyword left_parenthesis_keyword = 3;

      repeated IndexedColumn indexed_column = 4;

      RightParenthesisKeyword right_parenthesis_keyword = 5;

      ConflictClause conflict_clause = 6;
    }

    message Seq2 {
      UniqueKeyword unique_keyword = 1;

      LeftParenthesisKeyword left_parenthesis_keyword = 2;

      repeated IndexedColumn indexed_column = 3;

      RightParenthesisKeyword right_parenthesis_keyword = 4;

      ConflictClause conflict_clause = 5;
    }

    message Seq3 {
      CheckKeyword check_keyword = 1;

      LeftParenthesisKeyword left_parenthesis_keyword = 2;

      Expr expr = 3;

      RightParenthesisKeyword right_parenthesis_keyword = 4;
    }

    message Seq4 {
      ForeignKeyword foreign_keyword = 1;

      KeyKeyword key_keyword = 2;

      LeftParenthesisKeyword left_parenthesis_keyword = 3;

      repeated ColumnName column_name = 4;

      RightParenthesisKeyword right_parenthesis_keyword = 5;

      ForeignKeyClause foreign_key_clause = 6;
    }
  }
}
