syntax = "proto3";

package sqlite;

message FrameSpec {
  Alt1 alt1 = 1;

  Alt2 alt2 = 2;

  Alt3 alt3 = 3;

  message Alt1 {
    oneof value {
      RangeKeyword range_keyword = 1;

      RowsKeyword rows_keyword = 2;

      GroupsKeyword groups_keyword = 3;
    }
  }

  message Alt2 {
    oneof value {
      Between between = 1;

      UnboundedPreceding unbounded_preceding = 2;

      Seq1 seq1 = 3;

      CurrentRow current_row = 4;
    }

    message Between {
      BetweenKeyword between_keyword = 1;

      Alt1 alt1 = 2;

      AndKeyword and_keyword = 3;

      Alt2 alt2 = 4;

      message Alt1 {
        oneof value {
          UnboundedPreceding unbounded_preceding = 1;

          Seq1 seq1 = 2;

          CurrentRow current_row = 3;

          Seq2 seq2 = 4;
        }

        message UnboundedPreceding {
          UnboundedKeyword unbounded_keyword = 1;

          PrecedingKeyword preceding_keyword = 2;
        }

        message Seq1 {
          Expr expr = 1;

          PrecedingKeyword preceding_keyword = 2;
        }

        message CurrentRow {
          CurrentKeyword current_keyword = 1;

          RowKeyword row_keyword = 2;
        }

        message Seq2 {
          Expr expr = 1;

          FollowingKeyword following_keyword = 2;
        }
      }

      message Alt2 {
        oneof value {
          Seq1 seq1 = 1;

          CurrentRow current_row = 2;

          Seq2 seq2 = 3;

          UnboundedFollowing unbounded_following = 4;
        }

        message Seq1 {
          Expr expr = 1;

          PrecedingKeyword preceding_keyword = 2;
        }

        message CurrentRow {
          CurrentKeyword current_keyword = 1;

          RowKeyword row_keyword = 2;
        }

        message Seq2 {
          Expr expr = 1;

          FollowingKeyword following_keyword = 2;
        }

        message UnboundedFollowing {
          UnboundedKeyword unbounded_keyword = 1;

          FollowingKeyword following_keyword = 2;
        }
      }
    }

    message UnboundedPreceding {
      UnboundedKeyword unbounded_keyword = 1;

      PrecedingKeyword preceding_keyword = 2;
    }

    message Seq1 {
      Expr expr = 1;

      PrecedingKeyword preceding_keyword = 2;
    }

    message CurrentRow {
      CurrentKeyword current_keyword = 1;

      RowKeyword row_keyword = 2;
    }
  }

  message Alt3 {
    oneof value {
      ExcludeNoOthers exclude_no_others = 1;

      ExcludeCurrentRow exclude_current_row = 2;

      ExcludeGroup exclude_group = 3;

      ExcludeTies exclude_ties = 4;
    }

    message ExcludeNoOthers {
      ExcludeKeyword exclude_keyword = 1;

      NoKeyword no_keyword = 2;

      OthersKeyword others_keyword = 3;
    }

    message ExcludeCurrentRow {
      ExcludeKeyword exclude_keyword = 1;

      CurrentKeyword current_keyword = 2;

      RowKeyword row_keyword = 3;
    }

    message ExcludeGroup {
      ExcludeKeyword exclude_keyword = 1;

      GroupKeyword group_keyword = 2;
    }

    message ExcludeTies {
      ExcludeKeyword exclude_keyword = 1;

      TiesKeyword ties_keyword = 2;
    }
  }
}
