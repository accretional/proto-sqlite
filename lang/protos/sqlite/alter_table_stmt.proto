syntax = "proto3";

package sqlite;

message AlterTableStmt {
  Seq1 seq1 = 1;

  TableName table_name = 2;

  Alt1 alt1 = 3;

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt1 {
    oneof value {
      RenameTo rename_to = 1;

      Rename rename = 2;

      Add add = 3;

      AddConstraint add_constraint = 4;

      Drop drop = 5;

      DropConstraint drop_constraint = 6;

      AlterColumn alter_column = 7;
    }

    message RenameTo {
      NewTableName new_table_name = 1;
    }

    message Rename {
      ColumnKeyword column_keyword = 1;

      ColumnName column_name = 2;

      ToKeyword to_keyword = 3;

      NewColumnName new_column_name = 4;
    }

    message Add {
      ColumnKeyword column_keyword = 1;

      ColumnDef column_def = 2;
    }

    message AddConstraint {
      ConstraintName constraint_name = 1;

      CheckKeyword check_keyword = 2;

      LeftParenthesisKeyword left_parenthesis_keyword = 3;

      Expr expr = 4;

      RightParenthesisKeyword right_parenthesis_keyword = 5;

      ConflictClause conflict_clause = 6;
    }

    message Drop {
      ColumnKeyword column_keyword = 1;

      ColumnName column_name = 2;
    }

    message DropConstraint {
      ConstraintName constraint_name = 1;
    }

    message AlterColumn {
      ColumnName column_name = 1;

      Alt1 alt1 = 2;

      message Alt1 {
        oneof value {
          SetNotNull set_not_null = 1;

          DropNotNull drop_not_null = 2;
        }

        message SetNotNull {
          ConflictClause conflict_clause = 1;
        }

        message DropNotNull {
        }
      }
    }
  }
}
