syntax = "proto3";

package sqlite;

message TypeName {
  Name name = 1;

  repeated Name name_2 = 2;

  Alt1 alt1 = 3;

  message Alt1 {
    oneof value {
      LeftParenthesis left_parenthesis = 1;

      LeftParenthesis2 left_parenthesis2 = 2;
    }

    message LeftParenthesis {
      SignedNumber signed_number = 1;

      RightParenthesisKeyword right_parenthesis_keyword = 2;
    }

    message LeftParenthesis2 {
      SignedNumber signed_number = 1;

      CommaKeyword comma_keyword = 2;

      SignedNumber signed_number_2 = 3;

      RightParenthesisKeyword right_parenthesis_keyword = 4;
    }
  }
}
