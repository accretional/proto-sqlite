syntax = "proto3";

package sqlite;

message OverClause {
  Alt1 alt1 = 1;

  message Alt1 {
    oneof value {
      WindowName window_name = 1;

      LeftParenthesis left_parenthesis = 2;
    }

    message LeftParenthesis {
      BaseWindowName base_window_name = 1;

      PartitionBy partition_by = 2;

      OrderBy order_by = 3;

      FrameSpec frame_spec = 4;

      RightParenthesisKeyword right_parenthesis_keyword = 5;

      message PartitionBy {
        repeated Expr expr = 1;
      }

      message OrderBy {
        repeated OrderingTerm ordering_term = 1;
      }
    }
  }
}
