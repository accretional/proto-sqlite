syntax = "proto3";

package sqlite;

message UpdateStmt {
  With with = 1;

  Alt1 alt1 = 2;

  QualifiedTableName qualified_table_name = 3;

  SetKeyword set_keyword = 4;

  Alt2 alt2 = 5;

  EqualsSignKeyword equals_sign_keyword = 6;

  Expr expr = 7;

  repeated Comma comma = 8;

  From from = 9;

  Where where = 10;

  ReturningClause returning_clause = 11;

  message With {
    RecursiveKeyword recursive_keyword = 1;

    repeated CommonTableExpression common_table_expression = 2;
  }

  message Alt1 {
    oneof value {
      UpdateKeyword update_keyword = 1;

      UpdateOr update_or = 2;
    }

    message UpdateOr {
      Alt1 alt1 = 1;

      message Alt1 {
        oneof value {
          AbortKeyword abort_keyword = 1;

          FailKeyword fail_keyword = 2;

          IgnoreKeyword ignore_keyword = 3;

          ReplaceKeyword replace_keyword = 4;

          RollbackKeyword rollback_keyword = 5;
        }
      }
    }
  }

  message Alt2 {
    oneof value {
      ColumnName column_name = 1;

      ColumnNameList column_name_list = 2;
    }
  }

  message Comma {
    Alt1 alt1 = 1;

    EqualsSignKeyword equals_sign_keyword = 2;

    Expr expr = 3;

    message Alt1 {
      oneof value {
        ColumnName column_name = 1;

        ColumnNameList column_name_list = 2;
      }
    }
  }

  message From {
    Alt1 alt1 = 1;

    message Alt1 {
      oneof value {
        Seq1 seq1 = 1;

        JoinClause join_clause = 2;
      }

      message Seq1 {
        repeated TableOrSubquery table_or_subquery = 1;
      }
    }
  }

  message Where {
    Expr expr = 1;
  }
}
