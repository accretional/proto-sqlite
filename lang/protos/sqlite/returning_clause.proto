syntax = "proto3";

package sqlite;

message ReturningClause {
  repeated Alt1 alt1 = 1;

  message Alt1 {
    oneof value {
      AsteriskKeyword asterisk_keyword = 1;

      Seq1 seq1 = 2;
    }

    message Seq1 {
      Expr expr = 1;

      Seq1 seq1 = 2;

      message Seq1 {
        AsKeyword as_keyword = 1;

        ColumnAlias column_alias = 2;
      }
    }
  }
}
