syntax = "proto3";

package sqlite;

message UpsertClause {
  LeftParenthesis left_parenthesis = 1;

  DoKeyword do_keyword = 2;

  Alt1 alt1 = 3;

  message LeftParenthesis {
    repeated IndexedColumn indexed_column = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;

    Where where = 3;

    message Where {
      Expr expr = 1;
    }
  }

  message Alt1 {
    oneof value {
      NothingKeyword nothing_keyword = 1;

      UpdateSet update_set = 2;
    }

    message UpdateSet {
      Alt1 alt1 = 1;

      EqualsSignKeyword equals_sign_keyword = 2;

      Expr expr = 3;

      repeated Comma comma = 4;

      Where where = 5;

      message Alt1 {
        oneof value {
          ColumnName column_name = 1;

          ColumnNameList column_name_list = 2;
        }
      }

      message Comma {
        Alt1 alt1 = 1;

        EqualsSignKeyword equals_sign_keyword = 2;

        Expr expr = 3;

        message Alt1 {
          oneof value {
            ColumnName column_name = 1;

            ColumnNameList column_name_list = 2;
          }
        }
      }

      message Where {
        Expr expr = 1;
      }
    }
  }
}
