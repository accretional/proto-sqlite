syntax = "proto3";

package sqlite;

message PragmaStmt {
  Seq1 seq1 = 1;

  PragmaName pragma_name = 2;

  Alt1 alt1 = 3;

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt1 {
    oneof value {
      EqualsSign equals_sign = 1;

      LeftParenthesis left_parenthesis = 2;
    }

    message EqualsSign {
      PragmaValue pragma_value = 1;
    }

    message LeftParenthesis {
      PragmaValue pragma_value = 1;

      RightParenthesisKeyword right_parenthesis_keyword = 2;
    }
  }
}
