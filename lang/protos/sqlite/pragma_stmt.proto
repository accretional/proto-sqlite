syntax = "proto3";

package sqlite;

message PragmaStmt {
  PragmaKeyword pragma_keyword = 1;

  Seq1 seq1 = 2;

  PragmaName pragma_name = 3;

  Alt1 alt1 = 4;

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt1 {
    oneof value {
      Seq1 seq1 = 1;

      Seq2 seq2 = 2;
    }

    message Seq1 {
      EqualsSignKeyword equals_sign_keyword = 1;

      PragmaValue pragma_value = 2;
    }

    message Seq2 {
      LeftParenthesisKeyword left_parenthesis_keyword = 1;

      PragmaValue pragma_value = 2;

      RightParenthesisKeyword right_parenthesis_keyword = 3;
    }
  }
}
