syntax = "proto3";

package sqlite;

message Digit {
  oneof value {
    DigitZeroKeyword digit_zero_keyword = 1;

    DigitOneKeyword digit_one_keyword = 2;

    DigitTwoKeyword digit_two_keyword = 3;

    DigitThreeKeyword digit_three_keyword = 4;

    DigitFourKeyword digit_four_keyword = 5;

    DigitFiveKeyword digit_five_keyword = 6;

    DigitSixKeyword digit_six_keyword = 7;

    DigitSevenKeyword digit_seven_keyword = 8;

    DigitEightKeyword digit_eight_keyword = 9;

    DigitNineKeyword digit_nine_keyword = 10;
  }
}
