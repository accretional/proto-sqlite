syntax = "proto3";

package sqlite;

message ForeignKeyClause {
  ReferencesKeyword references_keyword = 1;

  ForeignTable foreign_table = 2;

  LeftParenthesis left_parenthesis = 3;

  repeated Alt1 alt1 = 4;

  Seq1 seq1 = 5;

  message LeftParenthesis {
    LeftParenthesisKeyword left_parenthesis_keyword = 1;

    repeated ColumnName column_name = 2;

    RightParenthesisKeyword right_parenthesis_keyword = 3;
  }

  message Alt1 {
    oneof value {
      On on = 1;

      Match match = 2;
    }

    message On {
      OnKeyword on_keyword = 1;

      Alt1 alt1 = 2;

      Alt2 alt2 = 3;

      message Alt1 {
        oneof value {
          DeleteKeyword delete_keyword = 1;

          UpdateKeyword update_keyword = 2;
        }
      }

      message Alt2 {
        oneof value {
          SetNull set_null = 1;

          SetDefault set_default = 2;

          CascadeKeyword cascade_keyword = 3;

          RestrictKeyword restrict_keyword = 4;

          NoAction no_action = 5;
        }

        message SetNull {
          SetKeyword set_keyword = 1;

          NullKeyword null_keyword = 2;
        }

        message SetDefault {
          SetKeyword set_keyword = 1;

          DefaultKeyword default_keyword = 2;
        }

        message NoAction {
          NoKeyword no_keyword = 1;

          ActionKeyword action_keyword = 2;
        }
      }
    }

    message Match {
      MatchKeyword match_keyword = 1;

      Name name = 2;
    }
  }

  message Seq1 {
    NotKeyword not_keyword = 1;

    DeferrableKeyword deferrable_keyword = 2;

    Initially initially = 3;

    message Initially {
      InitiallyKeyword initially_keyword = 1;

      Alt1 alt1 = 2;

      message Alt1 {
        oneof value {
          DeferredKeyword deferred_keyword = 1;

          ImmediateKeyword immediate_keyword = 2;
        }
      }
    }
  }
}
