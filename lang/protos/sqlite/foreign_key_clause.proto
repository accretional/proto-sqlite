syntax = "proto3";

package sqlite;

message ForeignKeyClause {
  ForeignTable foreign_table = 1;

  LeftParenthesis left_parenthesis = 2;

  repeated Alt1 alt1 = 3;

  Seq1 seq1 = 4;

  message LeftParenthesis {
    repeated ColumnName column_name = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;
  }

  message Alt1 {
    oneof value {
      On on = 1;

      Match match = 2;
    }

    message On {
      Alt1 alt1 = 1;

      Alt2 alt2 = 2;

      message Alt1 {
        oneof value {
          DeleteKeyword delete_keyword = 1;

          UpdateKeyword update_keyword = 2;
        }
      }

      message Alt2 {
        oneof value {
          SetNull set_null = 1;

          SetDefault set_default = 2;

          CascadeKeyword cascade_keyword = 3;

          RestrictKeyword restrict_keyword = 4;

          NoAction no_action = 5;
        }

        message SetNull {
        }

        message SetDefault {
        }

        message NoAction {
        }
      }
    }

    message Match {
      Name name = 1;
    }
  }

  message Seq1 {
    NotKeyword not_keyword = 1;

    DeferrableKeyword deferrable_keyword = 2;

    Initially initially = 3;

    message Initially {
      Alt1 alt1 = 1;

      message Alt1 {
        oneof value {
          DeferredKeyword deferred_keyword = 1;

          ImmediateKeyword immediate_keyword = 2;
        }
      }
    }
  }
}
