syntax = "proto3";

package sqlite;

message CreateTriggerStmt {
  Alt1 alt1 = 1;

  TriggerKeyword trigger_keyword = 2;

  IfNotExists if_not_exists = 3;

  Seq1 seq1 = 4;

  TriggerName trigger_name = 5;

  Alt2 alt2 = 6;

  Alt3 alt3 = 7;

  OnKeyword on_keyword = 8;

  TableName table_name = 9;

  ForEachRow for_each_row = 10;

  When when = 11;

  BeginKeyword begin_keyword = 12;

  Alt4 alt4 = 13;

  SemicolonKeyword semicolon_keyword = 14;

  repeated Seq2 seq2 = 15;

  EndKeyword end_keyword = 16;

  message Alt1 {
    oneof value {
      TempKeyword temp_keyword = 1;

      TemporaryKeyword temporary_keyword = 2;
    }
  }

  message IfNotExists {
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt2 {
    oneof value {
      BeforeKeyword before_keyword = 1;

      AfterKeyword after_keyword = 2;

      InsteadOf instead_of = 3;
    }

    message InsteadOf {
    }
  }

  message Alt3 {
    oneof value {
      DeleteKeyword delete_keyword = 1;

      InsertKeyword insert_keyword = 2;

      Update update = 3;
    }

    message Update {
      Of of = 1;

      message Of {
        repeated ColumnName column_name = 1;
      }
    }
  }

  message ForEachRow {
  }

  message When {
    Expr expr = 1;
  }

  message Alt4 {
    oneof value {
      UpdateStmt update_stmt = 1;

      InsertStmt insert_stmt = 2;

      DeleteStmt delete_stmt = 3;

      SelectStmt select_stmt = 4;
    }
  }

  message Seq2 {
    Alt1 alt1 = 1;

    SemicolonKeyword semicolon_keyword = 2;

    message Alt1 {
      oneof value {
        UpdateStmt update_stmt = 1;

        InsertStmt insert_stmt = 2;

        DeleteStmt delete_stmt = 3;

        SelectStmt select_stmt = 4;
      }
    }
  }
}
