syntax = "proto3";

package sqlite;

message SqlStmtList {
  SqlStmt sql_stmt = 1;

  repeated Seq1 seq1 = 2;

  message Seq1 {
    SemicolonKeyword semicolon_keyword = 1;

    SqlStmt sql_stmt = 2;
  }
}

message SqlStmt {
  Seq1 seq1 = 1;

  Alt1 alt1 = 2;

  message Seq1 {
    ExplainKeyword explain_keyword = 1;

    Seq1 seq1 = 2;

    message Seq1 {
      QueryKeyword query_keyword = 1;

      PlanKeyword plan_keyword = 2;
    }
  }

  message Alt1 {
    oneof value {
      AlterTableStmt alter_table_stmt = 1;

      AnalyzeStmt analyze_stmt = 2;

      AttachStmt attach_stmt = 3;

      BeginStmt begin_stmt = 4;

      CommitStmt commit_stmt = 5;

      CreateIndexStmt create_index_stmt = 6;

      CreateTableStmt create_table_stmt = 7;

      CreateTriggerStmt create_trigger_stmt = 8;

      CreateViewStmt create_view_stmt = 9;

      CreateVirtualTableStmt create_virtual_table_stmt = 10;

      DeleteStmt delete_stmt = 11;

      DeleteStmtLimited delete_stmt_limited = 12;

      DetachStmt detach_stmt = 13;

      DropIndexStmt drop_index_stmt = 14;

      DropTableStmt drop_table_stmt = 15;

      DropTriggerStmt drop_trigger_stmt = 16;

      DropViewStmt drop_view_stmt = 17;

      InsertStmt insert_stmt = 18;

      PragmaStmt pragma_stmt = 19;

      ReindexStmt reindex_stmt = 20;

      ReleaseStmt release_stmt = 21;

      RollbackStmt rollback_stmt = 22;

      SavepointStmt savepoint_stmt = 23;

      SelectStmt select_stmt = 24;

      UpdateStmt update_stmt = 25;

      UpdateStmtLimited update_stmt_limited = 26;

      VacuumStmt vacuum_stmt = 27;
    }
  }
}

message BeginStmt {
  BeginKeyword begin_keyword = 1;

  Alt1 alt1 = 2;

  TransactionKeyword transaction_keyword = 3;

  message Alt1 {
    oneof value {
      DeferredKeyword deferred_keyword = 1;

      ImmediateKeyword immediate_keyword = 2;

      ExclusiveKeyword exclusive_keyword = 3;
    }
  }
}

message CommitStmt {
  Alt1 alt1 = 1;

  TransactionKeyword transaction_keyword = 2;

  message Alt1 {
    oneof value {
      CommitKeyword commit_keyword = 1;

      EndKeyword end_keyword = 2;
    }
  }
}

message RollbackStmt {
  RollbackKeyword rollback_keyword = 1;

  TransactionKeyword transaction_keyword = 2;

  Seq1 seq1 = 3;

  message Seq1 {
    ToKeyword to_keyword = 1;

    SavepointKeyword savepoint_keyword = 2;

    SavepointName savepoint_name = 3;
  }
}

message SavepointStmt {
  SavepointKeyword savepoint_keyword = 1;

  SavepointName savepoint_name = 2;
}

message ReleaseStmt {
  ReleaseKeyword release_keyword = 1;

  SavepointKeyword savepoint_keyword = 2;

  SavepointName savepoint_name = 3;
}

message AttachStmt {
  AttachKeyword attach_keyword = 1;

  DatabaseKeyword database_keyword = 2;

  Expr expr = 3;

  AsKeyword as_keyword = 4;

  SchemaName schema_name = 5;
}

message DetachStmt {
  DetachKeyword detach_keyword = 1;

  DatabaseKeyword database_keyword = 2;

  SchemaName schema_name = 3;
}

message VacuumStmt {
  VacuumKeyword vacuum_keyword = 1;

  SchemaName schema_name = 2;

  Seq1 seq1 = 3;

  message Seq1 {
    IntoKeyword into_keyword = 1;

    Filename filename = 2;
  }
}

message AnalyzeStmt {
  AnalyzeKeyword analyze_keyword = 1;

  Alt1 alt1 = 2;

  message Alt1 {
    oneof value {
      SchemaName schema_name = 1;

      IndexOrTableName index_or_table_name = 2;

      Seq1 seq1 = 3;
    }

    message Seq1 {
      SchemaName schema_name = 1;

      FullStopKeyword full_stop_keyword = 2;

      TableOrIndexName table_or_index_name = 3;
    }
  }
}

message ReindexStmt {
  ReindexKeyword reindex_keyword = 1;

  Alt1 alt1 = 2;

  message Alt1 {
    oneof value {
      CollationName collation_name = 1;

      Seq1 seq1 = 2;
    }

    message Seq1 {
      Seq1 seq1 = 1;

      Alt1 alt1 = 2;

      message Seq1 {
        SchemaName schema_name = 1;

        FullStopKeyword full_stop_keyword = 2;
      }

      message Alt1 {
        oneof value {
          TableName table_name = 1;

          IndexName index_name = 2;
        }
      }
    }
  }
}

message PragmaStmt {
  PragmaKeyword pragma_keyword = 1;

  Seq1 seq1 = 2;

  PragmaName pragma_name = 3;

  Alt1 alt1 = 4;

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt1 {
    oneof value {
      Seq1 seq1 = 1;

      Seq2 seq2 = 2;
    }

    message Seq1 {
      EqualsSignKeyword equals_sign_keyword = 1;

      PragmaValue pragma_value = 2;
    }

    message Seq2 {
      LeftParenthesisKeyword left_parenthesis_keyword = 1;

      PragmaValue pragma_value = 2;

      RightParenthesisKeyword right_parenthesis_keyword = 3;
    }
  }
}

message DropTableStmt {
  DropKeyword drop_keyword = 1;

  TableKeyword table_keyword = 2;

  Seq1 seq1 = 3;

  Seq2 seq2 = 4;

  TableName table_name = 5;

  message Seq1 {
    IfKeyword if_keyword = 1;

    ExistsKeyword exists_keyword = 2;
  }

  message Seq2 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }
}

message DropIndexStmt {
  DropKeyword drop_keyword = 1;

  IndexKeyword index_keyword = 2;

  Seq1 seq1 = 3;

  Seq2 seq2 = 4;

  IndexName index_name = 5;

  message Seq1 {
    IfKeyword if_keyword = 1;

    ExistsKeyword exists_keyword = 2;
  }

  message Seq2 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }
}

message DropViewStmt {
  DropKeyword drop_keyword = 1;

  ViewKeyword view_keyword = 2;

  Seq1 seq1 = 3;

  Seq2 seq2 = 4;

  ViewName view_name = 5;

  message Seq1 {
    IfKeyword if_keyword = 1;

    ExistsKeyword exists_keyword = 2;
  }

  message Seq2 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }
}

message DropTriggerStmt {
  DropKeyword drop_keyword = 1;

  TriggerKeyword trigger_keyword = 2;

  Seq1 seq1 = 3;

  Seq2 seq2 = 4;

  TriggerName trigger_name = 5;

  message Seq1 {
    IfKeyword if_keyword = 1;

    ExistsKeyword exists_keyword = 2;
  }

  message Seq2 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }
}

message AlterTableStmt {
  AlterKeyword alter_keyword = 1;

  TableKeyword table_keyword = 2;

  Seq1 seq1 = 3;

  TableName table_name = 4;

  Alt1 alt1 = 5;

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt1 {
    oneof value {
      Seq1 seq1 = 1;

      Seq2 seq2 = 2;

      Seq3 seq3 = 3;

      Seq4 seq4 = 4;

      Seq5 seq5 = 5;

      Seq6 seq6 = 6;

      Seq7 seq7 = 7;
    }

    message Seq1 {
      RenameKeyword rename_keyword = 1;

      ToKeyword to_keyword = 2;

      NewTableName new_table_name = 3;
    }

    message Seq2 {
      RenameKeyword rename_keyword = 1;

      ColumnKeyword column_keyword = 2;

      ColumnName column_name = 3;

      ToKeyword to_keyword = 4;

      NewColumnName new_column_name = 5;
    }

    message Seq3 {
      AddKeyword add_keyword = 1;

      ColumnKeyword column_keyword = 2;

      ColumnDef column_def = 3;
    }

    message Seq4 {
      AddKeyword add_keyword = 1;

      ConstraintKeyword constraint_keyword = 2;

      ConstraintName constraint_name = 3;

      CheckKeyword check_keyword = 4;

      LeftParenthesisKeyword left_parenthesis_keyword = 5;

      Expr expr = 6;

      RightParenthesisKeyword right_parenthesis_keyword = 7;

      ConflictClause conflict_clause = 8;
    }

    message Seq5 {
      DropKeyword drop_keyword = 1;

      ColumnKeyword column_keyword = 2;

      ColumnName column_name = 3;
    }

    message Seq6 {
      DropKeyword drop_keyword = 1;

      ConstraintKeyword constraint_keyword = 2;

      ConstraintName constraint_name = 3;
    }

    message Seq7 {
      AlterKeyword alter_keyword = 1;

      ColumnKeyword column_keyword = 2;

      ColumnName column_name = 3;

      Alt1 alt1 = 4;

      message Alt1 {
        oneof value {
          Seq1 seq1 = 1;

          Seq2 seq2 = 2;
        }

        message Seq1 {
          SetKeyword set_keyword = 1;

          NotKeyword not_keyword = 2;

          NullKeyword null_keyword = 3;

          ConflictClause conflict_clause = 4;
        }

        message Seq2 {
          DropKeyword drop_keyword = 1;

          NotKeyword not_keyword = 2;

          NullKeyword null_keyword = 3;
        }
      }
    }
  }
}

message CreateTableStmt {
  CreateKeyword create_keyword = 1;

  Alt1 alt1 = 2;

  TableKeyword table_keyword = 3;

  Seq1 seq1 = 4;

  Seq2 seq2 = 5;

  TableName table_name = 6;

  Alt2 alt2 = 7;

  message Alt1 {
    oneof value {
      TempKeyword temp_keyword = 1;

      TemporaryKeyword temporary_keyword = 2;
    }
  }

  message Seq1 {
    IfKeyword if_keyword = 1;

    NotKeyword not_keyword = 2;

    ExistsKeyword exists_keyword = 3;
  }

  message Seq2 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt2 {
    oneof value {
      Seq1 seq1 = 1;

      Seq2 seq2 = 2;
    }

    message Seq1 {
      AsKeyword as_keyword = 1;

      SelectStmt select_stmt = 2;
    }

    message Seq2 {
      LeftParenthesisKeyword left_parenthesis_keyword = 1;

      ColumnDef column_def = 2;

      repeated Seq1 seq1 = 3;

      repeated Seq2 seq2 = 4;

      RightParenthesisKeyword right_parenthesis_keyword = 5;

      TableOptions table_options = 6;

      message Seq1 {
        CommaKeyword comma_keyword = 1;

        ColumnDef column_def = 2;
      }

      message Seq2 {
        CommaKeyword comma_keyword = 1;

        TableConstraint table_constraint = 2;
      }
    }
  }
}

message CreateIndexStmt {
  CreateKeyword create_keyword = 1;

  UniqueKeyword unique_keyword = 2;

  IndexKeyword index_keyword = 3;

  Seq1 seq1 = 4;

  Seq2 seq2 = 5;

  IndexName index_name = 6;

  OnKeyword on_keyword = 7;

  TableName table_name = 8;

  LeftParenthesisKeyword left_parenthesis_keyword = 9;

  IndexedColumn indexed_column = 10;

  repeated Seq3 seq3 = 11;

  RightParenthesisKeyword right_parenthesis_keyword = 12;

  Seq4 seq4 = 13;

  message Seq1 {
    IfKeyword if_keyword = 1;

    NotKeyword not_keyword = 2;

    ExistsKeyword exists_keyword = 3;
  }

  message Seq2 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Seq3 {
    CommaKeyword comma_keyword = 1;

    IndexedColumn indexed_column = 2;
  }

  message Seq4 {
    WhereKeyword where_keyword = 1;

    Expr expr = 2;
  }
}

message CreateTriggerStmt {
  CreateKeyword create_keyword = 1;

  Alt1 alt1 = 2;

  TriggerKeyword trigger_keyword = 3;

  Seq1 seq1 = 4;

  Seq2 seq2 = 5;

  TriggerName trigger_name = 6;

  Alt2 alt2 = 7;

  Alt3 alt3 = 8;

  OnKeyword on_keyword = 9;

  TableName table_name = 10;

  Seq3 seq3 = 11;

  Seq4 seq4 = 12;

  BeginKeyword begin_keyword = 13;

  Alt4 alt4 = 14;

  SemicolonKeyword semicolon_keyword = 15;

  repeated Seq5 seq5 = 16;

  EndKeyword end_keyword = 17;

  message Alt1 {
    oneof value {
      TempKeyword temp_keyword = 1;

      TemporaryKeyword temporary_keyword = 2;
    }
  }

  message Seq1 {
    IfKeyword if_keyword = 1;

    NotKeyword not_keyword = 2;

    ExistsKeyword exists_keyword = 3;
  }

  message Seq2 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt2 {
    oneof value {
      BeforeKeyword before_keyword = 1;

      AfterKeyword after_keyword = 2;

      Seq1 seq1 = 3;
    }

    message Seq1 {
      InsteadKeyword instead_keyword = 1;

      OfKeyword of_keyword = 2;
    }
  }

  message Alt3 {
    oneof value {
      DeleteKeyword delete_keyword = 1;

      InsertKeyword insert_keyword = 2;

      Seq1 seq1 = 3;
    }

    message Seq1 {
      UpdateKeyword update_keyword = 1;

      Seq1 seq1 = 2;

      message Seq1 {
        OfKeyword of_keyword = 1;

        ColumnName column_name = 2;

        repeated Seq1 seq1 = 3;

        message Seq1 {
          CommaKeyword comma_keyword = 1;

          ColumnName column_name = 2;
        }
      }
    }
  }

  message Seq3 {
    ForKeyword for_keyword = 1;

    EachKeyword each_keyword = 2;

    RowKeyword row_keyword = 3;
  }

  message Seq4 {
    WhenKeyword when_keyword = 1;

    Expr expr = 2;
  }

  message Alt4 {
    oneof value {
      UpdateStmt update_stmt = 1;

      InsertStmt insert_stmt = 2;

      DeleteStmt delete_stmt = 3;

      SelectStmt select_stmt = 4;
    }
  }

  message Seq5 {
    Alt1 alt1 = 1;

    SemicolonKeyword semicolon_keyword = 2;

    message Alt1 {
      oneof value {
        UpdateStmt update_stmt = 1;

        InsertStmt insert_stmt = 2;

        DeleteStmt delete_stmt = 3;

        SelectStmt select_stmt = 4;
      }
    }
  }
}

message CreateViewStmt {
  CreateKeyword create_keyword = 1;

  Alt1 alt1 = 2;

  ViewKeyword view_keyword = 3;

  Seq1 seq1 = 4;

  Seq2 seq2 = 5;

  ViewName view_name = 6;

  Seq3 seq3 = 7;

  AsKeyword as_keyword = 8;

  SelectStmt select_stmt = 9;

  message Alt1 {
    oneof value {
      TempKeyword temp_keyword = 1;

      TemporaryKeyword temporary_keyword = 2;
    }
  }

  message Seq1 {
    IfKeyword if_keyword = 1;

    NotKeyword not_keyword = 2;

    ExistsKeyword exists_keyword = 3;
  }

  message Seq2 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Seq3 {
    LeftParenthesisKeyword left_parenthesis_keyword = 1;

    ColumnName column_name = 2;

    repeated Seq1 seq1 = 3;

    RightParenthesisKeyword right_parenthesis_keyword = 4;

    message Seq1 {
      CommaKeyword comma_keyword = 1;

      ColumnName column_name = 2;
    }
  }
}

message CreateVirtualTableStmt {
  CreateKeyword create_keyword = 1;

  VirtualKeyword virtual_keyword = 2;

  TableKeyword table_keyword = 3;

  Seq1 seq1 = 4;

  Seq2 seq2 = 5;

  TableName table_name = 6;

  UsingKeyword using_keyword = 7;

  ModuleName module_name = 8;

  Seq3 seq3 = 9;

  message Seq1 {
    IfKeyword if_keyword = 1;

    NotKeyword not_keyword = 2;

    ExistsKeyword exists_keyword = 3;
  }

  message Seq2 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Seq3 {
    LeftParenthesisKeyword left_parenthesis_keyword = 1;

    Seq1 seq1 = 2;

    RightParenthesisKeyword right_parenthesis_keyword = 3;

    message Seq1 {
      ModuleArgument module_argument = 1;

      repeated Seq1 seq1 = 2;

      message Seq1 {
        CommaKeyword comma_keyword = 1;

        ModuleArgument module_argument = 2;
      }
    }
  }
}

message SelectStmt {
  Seq1 seq1 = 1;

  SelectCore select_core = 2;

  repeated Seq2 seq2 = 3;

  Seq3 seq3 = 4;

  Seq4 seq4 = 5;

  message Seq1 {
    WithKeyword with_keyword = 1;

    RecursiveKeyword recursive_keyword = 2;

    CommonTableExpression common_table_expression = 3;

    repeated Seq1 seq1 = 4;

    message Seq1 {
      CommaKeyword comma_keyword = 1;

      CommonTableExpression common_table_expression = 2;
    }
  }

  message Seq2 {
    CompoundOperator compound_operator = 1;

    SelectCore select_core = 2;
  }

  message Seq3 {
    OrderKeyword order_keyword = 1;

    ByKeyword by_keyword = 2;

    OrderingTerm ordering_term = 3;

    repeated Seq1 seq1 = 4;

    message Seq1 {
      CommaKeyword comma_keyword = 1;

      OrderingTerm ordering_term = 2;
    }
  }

  message Seq4 {
    LimitKeyword limit_keyword = 1;

    Expr expr = 2;

    Alt1 alt1 = 3;

    message Alt1 {
      oneof value {
        Seq1 seq1 = 1;

        Seq2 seq2 = 2;
      }

      message Seq1 {
        OffsetKeyword offset_keyword = 1;

        Expr expr = 2;
      }

      message Seq2 {
        CommaKeyword comma_keyword = 1;

        Expr expr = 2;
      }
    }
  }
}

message SelectCore {
  oneof value {
    Seq1 seq1 = 1;

    Seq2 seq2 = 2;
  }

  message Seq1 {
    SelectKeyword select_keyword = 1;

    Alt1 alt1 = 2;

    ResultColumn result_column = 3;

    repeated Seq1 seq1 = 4;

    Seq2 seq2 = 5;

    Seq3 seq3 = 6;

    Seq4 seq4 = 7;

    Seq5 seq5 = 8;

    message Alt1 {
      oneof value {
        DistinctKeyword distinct_keyword = 1;

        AllKeyword all_keyword = 2;
      }
    }

    message Seq1 {
      CommaKeyword comma_keyword = 1;

      ResultColumn result_column = 2;
    }

    message Seq2 {
      FromKeyword from_keyword = 1;

      Alt1 alt1 = 2;

      message Alt1 {
        oneof value {
          Seq1 seq1 = 1;

          JoinClause join_clause = 2;
        }

        message Seq1 {
          TableOrSubquery table_or_subquery = 1;

          repeated Seq1 seq1 = 2;

          message Seq1 {
            CommaKeyword comma_keyword = 1;

            TableOrSubquery table_or_subquery = 2;
          }
        }
      }
    }

    message Seq3 {
      WhereKeyword where_keyword = 1;

      Expr expr = 2;
    }

    message Seq4 {
      GroupKeyword group_keyword = 1;

      ByKeyword by_keyword = 2;

      Expr expr = 3;

      repeated Seq1 seq1 = 4;

      Seq2 seq2 = 5;

      message Seq1 {
        CommaKeyword comma_keyword = 1;

        Expr expr = 2;
      }

      message Seq2 {
        HavingKeyword having_keyword = 1;

        Expr expr = 2;
      }
    }

    message Seq5 {
      WindowKeyword window_keyword = 1;

      WindowName window_name = 2;

      AsKeyword as_keyword = 3;

      WindowDefn window_defn = 4;

      repeated Seq1 seq1 = 5;

      message Seq1 {
        CommaKeyword comma_keyword = 1;

        WindowName window_name = 2;

        AsKeyword as_keyword = 3;

        WindowDefn window_defn = 4;
      }
    }
  }

  message Seq2 {
    ValuesKeyword values_keyword = 1;

    LeftParenthesisKeyword left_parenthesis_keyword = 2;

    Expr expr = 3;

    repeated Seq1 seq1 = 4;

    RightParenthesisKeyword right_parenthesis_keyword = 5;

    repeated Seq2 seq2 = 6;

    message Seq1 {
      CommaKeyword comma_keyword = 1;

      Expr expr = 2;
    }

    message Seq2 {
      CommaKeyword comma_keyword = 1;

      LeftParenthesisKeyword left_parenthesis_keyword = 2;

      Expr expr = 3;

      repeated Seq1 seq1 = 4;

      RightParenthesisKeyword right_parenthesis_keyword = 5;

      message Seq1 {
        CommaKeyword comma_keyword = 1;

        Expr expr = 2;
      }
    }
  }
}

message FactoredSelectStmt {
  Seq1 seq1 = 1;

  SelectCore select_core = 2;

  repeated Seq2 seq2 = 3;

  Seq3 seq3 = 4;

  Seq4 seq4 = 5;

  message Seq1 {
    WithKeyword with_keyword = 1;

    RecursiveKeyword recursive_keyword = 2;

    CommonTableExpression common_table_expression = 3;

    repeated Seq1 seq1 = 4;

    message Seq1 {
      CommaKeyword comma_keyword = 1;

      CommonTableExpression common_table_expression = 2;
    }
  }

  message Seq2 {
    CompoundOperator compound_operator = 1;

    SelectCore select_core = 2;
  }

  message Seq3 {
    OrderKeyword order_keyword = 1;

    ByKeyword by_keyword = 2;

    OrderingTerm ordering_term = 3;

    repeated Seq1 seq1 = 4;

    message Seq1 {
      CommaKeyword comma_keyword = 1;

      OrderingTerm ordering_term = 2;
    }
  }

  message Seq4 {
    LimitKeyword limit_keyword = 1;

    Expr expr = 2;

    Alt1 alt1 = 3;

    message Alt1 {
      oneof value {
        Seq1 seq1 = 1;

        Seq2 seq2 = 2;
      }

      message Seq1 {
        OffsetKeyword offset_keyword = 1;

        Expr expr = 2;
      }

      message Seq2 {
        CommaKeyword comma_keyword = 1;

        Expr expr = 2;
      }
    }
  }
}

message ResultColumn {
  oneof value {
    Seq1 seq1 = 1;

    AsteriskKeyword asterisk_keyword = 2;

    Seq2 seq2 = 3;
  }

  message Seq1 {
    Expr expr = 1;

    Seq1 seq1 = 2;

    message Seq1 {
      AsKeyword as_keyword = 1;

      ColumnAlias column_alias = 2;
    }
  }

  message Seq2 {
    TableName table_name = 1;

    FullStopKeyword full_stop_keyword = 2;

    AsteriskKeyword asterisk_keyword = 3;
  }
}

message CompoundOperator {
  oneof value {
    UnionKeyword union_keyword = 1;

    Seq1 seq1 = 2;

    IntersectKeyword intersect_keyword = 3;

    ExceptKeyword except_keyword = 4;
  }

  message Seq1 {
    UnionKeyword union_keyword = 1;

    AllKeyword all_keyword = 2;
  }
}

message CommonTableExpression {
  TableName table_name = 1;

  Seq1 seq1 = 2;

  AsKeyword as_keyword = 3;

  Alt1 alt1 = 4;

  LeftParenthesisKeyword left_parenthesis_keyword = 5;

  SelectStmt select_stmt = 6;

  RightParenthesisKeyword right_parenthesis_keyword = 7;

  message Seq1 {
    LeftParenthesisKeyword left_parenthesis_keyword = 1;

    ColumnName column_name = 2;

    repeated Seq1 seq1 = 3;

    RightParenthesisKeyword right_parenthesis_keyword = 4;

    message Seq1 {
      CommaKeyword comma_keyword = 1;

      ColumnName column_name = 2;
    }
  }

  message Alt1 {
    oneof value {
      Seq1 seq1 = 1;

      MaterializedKeyword materialized_keyword = 2;
    }

    message Seq1 {
      NotKeyword not_keyword = 1;

      MaterializedKeyword materialized_keyword = 2;
    }
  }
}

message WithClause {
  WithKeyword with_keyword = 1;

  RecursiveKeyword recursive_keyword = 2;

  CteTableName cte_table_name = 3;

  AsKeyword as_keyword = 4;

  Alt1 alt1 = 5;

  LeftParenthesisKeyword left_parenthesis_keyword = 6;

  SelectStmt select_stmt = 7;

  RightParenthesisKeyword right_parenthesis_keyword = 8;

  repeated Seq1 seq1 = 9;

  message Alt1 {
    oneof value {
      Seq1 seq1 = 1;

      MaterializedKeyword materialized_keyword = 2;
    }

    message Seq1 {
      NotKeyword not_keyword = 1;

      MaterializedKeyword materialized_keyword = 2;
    }
  }

  message Seq1 {
    CommaKeyword comma_keyword = 1;

    CteTableName cte_table_name = 2;

    AsKeyword as_keyword = 3;

    Alt1 alt1 = 4;

    LeftParenthesisKeyword left_parenthesis_keyword = 5;

    SelectStmt select_stmt = 6;

    RightParenthesisKeyword right_parenthesis_keyword = 7;

    message Alt1 {
      oneof value {
        Seq1 seq1 = 1;

        MaterializedKeyword materialized_keyword = 2;
      }

      message Seq1 {
        NotKeyword not_keyword = 1;

