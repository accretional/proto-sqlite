syntax = "proto3";

package sqlite;

option go_package = "github.com/accretional/proto-sqlite/sqlite/pb;sqlitepb";

message SqlStmtList {
  repeated SqlStmt sql_stmt = 1;
}

message SqlStmt {
  Explain explain = 1;

  Alt1 alt1 = 2;

  message Explain {
    QueryPlan query_plan = 1;

    message QueryPlan {
    }
  }

  message Alt1 {
    oneof value {
      AlterTableStmt alter_table_stmt = 1;

      AnalyzeStmt analyze_stmt = 2;

      AttachStmt attach_stmt = 3;

      BeginStmt begin_stmt = 4;

      CommitStmt commit_stmt = 5;

      CreateIndexStmt create_index_stmt = 6;

      CreateTableStmt create_table_stmt = 7;

      CreateTriggerStmt create_trigger_stmt = 8;

      CreateViewStmt create_view_stmt = 9;

      CreateVirtualTableStmt create_virtual_table_stmt = 10;

      DeleteStmt delete_stmt = 11;

      DeleteStmtLimited delete_stmt_limited = 12;

      DetachStmt detach_stmt = 13;

      DropIndexStmt drop_index_stmt = 14;

      DropTableStmt drop_table_stmt = 15;

      DropTriggerStmt drop_trigger_stmt = 16;

      DropViewStmt drop_view_stmt = 17;

      InsertStmt insert_stmt = 18;

      PragmaStmt pragma_stmt = 19;

      ReindexStmt reindex_stmt = 20;

      ReleaseStmt release_stmt = 21;

      RollbackStmt rollback_stmt = 22;

      SavepointStmt savepoint_stmt = 23;

      SelectStmt select_stmt = 24;

      UpdateStmt update_stmt = 25;

      UpdateStmtLimited update_stmt_limited = 26;

      VacuumStmt vacuum_stmt = 27;
    }
  }
}

message BeginStmt {
  Alt1 alt1 = 1;

  TransactionKeyword transaction_keyword = 2;

  message Alt1 {
    oneof value {
      DeferredKeyword deferred_keyword = 1;

      ImmediateKeyword immediate_keyword = 2;

      ExclusiveKeyword exclusive_keyword = 3;
    }
  }
}

message CommitStmt {
  Alt1 alt1 = 1;

  TransactionKeyword transaction_keyword = 2;

  message Alt1 {
    oneof value {
      CommitKeyword commit_keyword = 1;

      EndKeyword end_keyword = 2;
    }
  }
}

message RollbackStmt {
  TransactionKeyword transaction_keyword = 1;

  To to = 2;

  message To {
    SavepointKeyword savepoint_keyword = 1;

    SavepointName savepoint_name = 2;
  }
}

message SavepointStmt {
  SavepointName savepoint_name = 1;
}

message ReleaseStmt {
  SavepointKeyword savepoint_keyword = 1;

  SavepointName savepoint_name = 2;
}

message AttachStmt {
  DatabaseKeyword database_keyword = 1;

  Expr expr = 2;

  AsKeyword as_keyword = 3;

  SchemaName schema_name = 4;
}

message DetachStmt {
  DatabaseKeyword database_keyword = 1;

  SchemaName schema_name = 2;
}

message VacuumStmt {
  SchemaName schema_name = 1;

  Into into = 2;

  message Into {
    Filename filename = 1;
  }
}

message AnalyzeStmt {
  Alt1 alt1 = 1;

  message Alt1 {
    oneof value {
      SchemaName schema_name = 1;

      IndexOrTableName index_or_table_name = 2;

      Seq1 seq1 = 3;
    }

    message Seq1 {
      SchemaName schema_name = 1;

      FullStopKeyword full_stop_keyword = 2;

      TableOrIndexName table_or_index_name = 3;
    }
  }
}

message ReindexStmt {
  Alt1 alt1 = 1;

  message Alt1 {
    oneof value {
      CollationName collation_name = 1;

      Seq1 seq1 = 2;
    }

    message Seq1 {
      Seq1 seq1 = 1;

      Alt1 alt1 = 2;

      message Seq1 {
        SchemaName schema_name = 1;

        FullStopKeyword full_stop_keyword = 2;
      }

      message Alt1 {
        oneof value {
          TableName table_name = 1;

          IndexName index_name = 2;
        }
      }
    }
  }
}

message PragmaStmt {
  Seq1 seq1 = 1;

  PragmaName pragma_name = 2;

  Alt1 alt1 = 3;

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt1 {
    oneof value {
      EqualsSign equals_sign = 1;

      LeftParenthesis left_parenthesis = 2;
    }

    message EqualsSign {
      PragmaValue pragma_value = 1;
    }

    message LeftParenthesis {
      PragmaValue pragma_value = 1;

      RightParenthesisKeyword right_parenthesis_keyword = 2;
    }
  }
}

message DropTableStmt {
  IfExists if_exists = 1;

  Seq1 seq1 = 2;

  TableName table_name = 3;

  message IfExists {
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }
}

message DropIndexStmt {
  IfExists if_exists = 1;

  Seq1 seq1 = 2;

  IndexName index_name = 3;

  message IfExists {
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }
}

message DropViewStmt {
  IfExists if_exists = 1;

  Seq1 seq1 = 2;

  ViewName view_name = 3;

  message IfExists {
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }
}

message DropTriggerStmt {
  IfExists if_exists = 1;

  Seq1 seq1 = 2;

  TriggerName trigger_name = 3;

  message IfExists {
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }
}

message AlterTableStmt {
  Seq1 seq1 = 1;

  TableName table_name = 2;

  Alt1 alt1 = 3;

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt1 {
    oneof value {
      RenameTo rename_to = 1;

      Rename rename = 2;

      Add add = 3;

      AddConstraint add_constraint = 4;

      Drop drop = 5;

      DropConstraint drop_constraint = 6;

      AlterColumn alter_column = 7;
    }

    message RenameTo {
      NewTableName new_table_name = 1;
    }

    message Rename {
      ColumnKeyword column_keyword = 1;

      ColumnName column_name = 2;

      ToKeyword to_keyword = 3;

      NewColumnName new_column_name = 4;
    }

    message Add {
      ColumnKeyword column_keyword = 1;

      ColumnDef column_def = 2;
    }

    message AddConstraint {
      ConstraintName constraint_name = 1;

      CheckKeyword check_keyword = 2;

      LeftParenthesisKeyword left_parenthesis_keyword = 3;

      Expr expr = 4;

      RightParenthesisKeyword right_parenthesis_keyword = 5;

      ConflictClause conflict_clause = 6;
    }

    message Drop {
      ColumnKeyword column_keyword = 1;

      ColumnName column_name = 2;
    }

    message DropConstraint {
      ConstraintName constraint_name = 1;
    }

    message AlterColumn {
      ColumnName column_name = 1;

      Alt1 alt1 = 2;

      message Alt1 {
        oneof value {
          SetNotNull set_not_null = 1;

          DropNotNull drop_not_null = 2;
        }

        message SetNotNull {
          ConflictClause conflict_clause = 1;
        }

        message DropNotNull {
        }
      }
    }
  }
}

message CreateTableStmt {
  Alt1 alt1 = 1;

  TableKeyword table_keyword = 2;

  IfNotExists if_not_exists = 3;

  Seq1 seq1 = 4;

  TableName table_name = 5;

  Alt2 alt2 = 6;

  message Alt1 {
    oneof value {
      TempKeyword temp_keyword = 1;

      TemporaryKeyword temporary_keyword = 2;
    }
  }

  message IfNotExists {
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt2 {
    oneof value {
      As as = 1;

      LeftParenthesis left_parenthesis = 2;
    }

    message As {
      SelectStmt select_stmt = 1;
    }

    message LeftParenthesis {
      repeated ColumnDef column_def = 1;

      repeated Comma comma = 2;

      RightParenthesisKeyword right_parenthesis_keyword = 3;

      TableOptions table_options = 4;

      message Comma {
        TableConstraint table_constraint = 1;
      }
    }
  }
}

message CreateIndexStmt {
  UniqueKeyword unique_keyword = 1;

  IndexKeyword index_keyword = 2;

  IfNotExists if_not_exists = 3;

  Seq1 seq1 = 4;

  IndexName index_name = 5;

  OnKeyword on_keyword = 6;

  TableName table_name = 7;

  LeftParenthesisKeyword left_parenthesis_keyword = 8;

  repeated IndexedColumn indexed_column = 9;

  RightParenthesisKeyword right_parenthesis_keyword = 10;

  Where where = 11;

  message IfNotExists {
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Where {
    Expr expr = 1;
  }
}

message CreateTriggerStmt {
  Alt1 alt1 = 1;

  TriggerKeyword trigger_keyword = 2;

  IfNotExists if_not_exists = 3;

  Seq1 seq1 = 4;

  TriggerName trigger_name = 5;

  Alt2 alt2 = 6;

  Alt3 alt3 = 7;

  OnKeyword on_keyword = 8;

  TableName table_name = 9;

  ForEachRow for_each_row = 10;

  When when = 11;

  BeginKeyword begin_keyword = 12;

  Alt4 alt4 = 13;

  SemicolonKeyword semicolon_keyword = 14;

  repeated Seq2 seq2 = 15;

  EndKeyword end_keyword = 16;

  message Alt1 {
    oneof value {
      TempKeyword temp_keyword = 1;

      TemporaryKeyword temporary_keyword = 2;
    }
  }

  message IfNotExists {
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message Alt2 {
    oneof value {
      BeforeKeyword before_keyword = 1;

      AfterKeyword after_keyword = 2;

      InsteadOf instead_of = 3;
    }

    message InsteadOf {
    }
  }

  message Alt3 {
    oneof value {
      DeleteKeyword delete_keyword = 1;

      InsertKeyword insert_keyword = 2;

      Update update = 3;
    }

    message Update {
      Of of = 1;

      message Of {
        repeated ColumnName column_name = 1;
      }
    }
  }

  message ForEachRow {
  }

  message When {
    Expr expr = 1;
  }

  message Alt4 {
    oneof value {
      UpdateStmt update_stmt = 1;

      InsertStmt insert_stmt = 2;

      DeleteStmt delete_stmt = 3;

      SelectStmt select_stmt = 4;
    }
  }

  message Seq2 {
    Alt1 alt1 = 1;

    SemicolonKeyword semicolon_keyword = 2;

    message Alt1 {
      oneof value {
        UpdateStmt update_stmt = 1;

        InsertStmt insert_stmt = 2;

        DeleteStmt delete_stmt = 3;

        SelectStmt select_stmt = 4;
      }
    }
  }
}

message CreateViewStmt {
  Alt1 alt1 = 1;

  ViewKeyword view_keyword = 2;

  IfNotExists if_not_exists = 3;

  Seq1 seq1 = 4;

  ViewName view_name = 5;

  LeftParenthesis left_parenthesis = 6;

  AsKeyword as_keyword = 7;

  SelectStmt select_stmt = 8;

  message Alt1 {
    oneof value {
      TempKeyword temp_keyword = 1;

      TemporaryKeyword temporary_keyword = 2;
    }
  }

  message IfNotExists {
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message LeftParenthesis {
    repeated ColumnName column_name = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;
  }
}

message CreateVirtualTableStmt {
  IfNotExists if_not_exists = 1;

  Seq1 seq1 = 2;

  TableName table_name = 3;

  UsingKeyword using_keyword = 4;

  ModuleName module_name = 5;

  LeftParenthesis left_parenthesis = 6;

  message IfNotExists {
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message LeftParenthesis {
    Seq1 seq1 = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;

    message Seq1 {
      repeated ModuleArgument module_argument = 1;
    }
  }
}

message SelectStmt {
  With with = 1;

  SelectCore select_core = 2;

  repeated Seq1 seq1 = 3;

  OrderBy order_by = 4;

  Limit limit = 5;

  message With {
    RecursiveKeyword recursive_keyword = 1;

    repeated CommonTableExpression common_table_expression = 2;
  }

  message Seq1 {
    CompoundOperator compound_operator = 1;

    SelectCore select_core = 2;
  }

  message OrderBy {
    repeated OrderingTerm ordering_term = 1;
  }

  message Limit {
    Expr expr = 1;

    Alt1 alt1 = 2;

    message Alt1 {
      oneof value {
        Offset offset = 1;

        Comma comma = 2;
      }

      message Offset {
        Expr expr = 1;
      }

      message Comma {
        Expr expr = 1;
      }
    }
  }
}

message SelectCore {
  oneof value {
    Select select = 1;

    ValuesLeftParenthesis values_left_parenthesis = 2;
  }

  message Select {
    Alt1 alt1 = 1;

    repeated ResultColumn result_column = 2;

    From from = 3;

    Where where = 4;

    GroupBy group_by = 5;

    Window window = 6;

    message Alt1 {
      oneof value {
        DistinctKeyword distinct_keyword = 1;

        AllKeyword all_keyword = 2;
      }
    }

    message From {
      Alt1 alt1 = 1;

      message Alt1 {
        oneof value {
          Seq1 seq1 = 1;

          JoinClause join_clause = 2;
        }

        message Seq1 {
          repeated TableOrSubquery table_or_subquery = 1;
        }
      }
    }

    message Where {
      Expr expr = 1;
    }

    message GroupBy {
      repeated Expr expr = 1;

      Having having = 2;

      message Having {
        Expr expr = 1;
      }
    }

    message Window {
      WindowName window_name = 1;

      AsKeyword as_keyword = 2;

      WindowDefn window_defn = 3;

      repeated Comma comma = 4;

      message Comma {
        WindowName window_name = 1;

        AsKeyword as_keyword = 2;

        WindowDefn window_defn = 3;
      }
    }
  }

  message ValuesLeftParenthesis {
    repeated Expr expr = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;

    repeated CommaLeftParenthesis comma_left_parenthesis = 3;

    message CommaLeftParenthesis {
      repeated Expr expr = 1;

      RightParenthesisKeyword right_parenthesis_keyword = 2;
    }
  }
}

message FactoredSelectStmt {
  With with = 1;

  SelectCore select_core = 2;

  repeated Seq1 seq1 = 3;

  OrderBy order_by = 4;

  Limit limit = 5;

  message With {
    RecursiveKeyword recursive_keyword = 1;

    repeated CommonTableExpression common_table_expression = 2;
  }

  message Seq1 {
    CompoundOperator compound_operator = 1;

    SelectCore select_core = 2;
  }

  message OrderBy {
    repeated OrderingTerm ordering_term = 1;
  }

  message Limit {
    Expr expr = 1;

    Alt1 alt1 = 2;

    message Alt1 {
      oneof value {
        Offset offset = 1;

        Comma comma = 2;
      }

      message Offset {
        Expr expr = 1;
      }

      message Comma {
        Expr expr = 1;
      }
    }
  }
}

message ResultColumn {
  oneof value {
    Seq1 seq1 = 1;

    AsteriskKeyword asterisk_keyword = 2;

    Seq2 seq2 = 3;
  }

  message Seq1 {
    Expr expr = 1;

    Seq1 seq1 = 2;

    message Seq1 {
      AsKeyword as_keyword = 1;

      ColumnAlias column_alias = 2;
    }
  }

  message Seq2 {
    TableName table_name = 1;

    FullStopKeyword full_stop_keyword = 2;

    AsteriskKeyword asterisk_keyword = 3;
  }
}

message CompoundOperator {
  oneof value {
    UnionKeyword union_keyword = 1;

    UnionAll union_all = 2;

    IntersectKeyword intersect_keyword = 3;

    ExceptKeyword except_keyword = 4;
  }

  message UnionAll {
  }
}

message CommonTableExpression {
  TableName table_name = 1;

  LeftParenthesis left_parenthesis = 2;

  AsKeyword as_keyword = 3;

  Alt1 alt1 = 4;

  LeftParenthesisKeyword left_parenthesis_keyword = 5;

  SelectStmt select_stmt = 6;

  RightParenthesisKeyword right_parenthesis_keyword = 7;

  message LeftParenthesis {
    repeated ColumnName column_name = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;
  }

  message Alt1 {
    oneof value {
      NotMaterialized not_materialized = 1;

      MaterializedKeyword materialized_keyword = 2;
    }

    message NotMaterialized {
    }
  }
}

message WithClause {
  RecursiveKeyword recursive_keyword = 1;

  CteTableName cte_table_name = 2;

  AsKeyword as_keyword = 3;

  Alt1 alt1 = 4;

  LeftParenthesisKeyword left_parenthesis_keyword = 5;

  SelectStmt select_stmt = 6;

  RightParenthesisKeyword right_parenthesis_keyword = 7;

  repeated Comma comma = 8;

  message Alt1 {
    oneof value {
      NotMaterialized not_materialized = 1;

      MaterializedKeyword materialized_keyword = 2;
    }

    message NotMaterialized {
    }
  }

  message Comma {
    CteTableName cte_table_name = 1;

    AsKeyword as_keyword = 2;

    Alt1 alt1 = 3;

    LeftParenthesisKeyword left_parenthesis_keyword = 4;

    SelectStmt select_stmt = 5;

    RightParenthesisKeyword right_parenthesis_keyword = 6;

    message Alt1 {
      oneof value {
        NotMaterialized not_materialized = 1;

        MaterializedKeyword materialized_keyword = 2;
      }

      message NotMaterialized {
      }
    }
  }
}

message DeleteStmt {
  With with = 1;

  DeleteKeyword delete_keyword = 2;

  FromKeyword from_keyword = 3;

  QualifiedTableName qualified_table_name = 4;

  Where where = 5;

  ReturningClause returning_clause = 6;

  message With {
    RecursiveKeyword recursive_keyword = 1;

    repeated CommonTableExpression common_table_expression = 2;
  }

  message Where {
    Expr expr = 1;
  }
}

message DeleteStmtLimited {
  With with = 1;

  DeleteKeyword delete_keyword = 2;

  FromKeyword from_keyword = 3;

  QualifiedTableName qualified_table_name = 4;

  Where where = 5;

  ReturningClause returning_clause = 6;

  OrderBy order_by = 7;

  LimitKeyword limit_keyword = 8;

  Expr expr = 9;

  Alt1 alt1 = 10;

  message With {
    RecursiveKeyword recursive_keyword = 1;

    repeated CommonTableExpression common_table_expression = 2;
  }

  message Where {
    Expr expr = 1;
  }

  message OrderBy {
    repeated OrderingTerm ordering_term = 1;
  }

  message Alt1 {
    oneof value {
      Offset offset = 1;

      Comma comma = 2;
    }

    message Offset {
      Expr expr = 1;
    }

    message Comma {
      Expr expr = 1;
    }
  }
}

message InsertStmt {
  With with = 1;

  Alt1 alt1 = 2;

  IntoKeyword into_keyword = 3;

  Seq1 seq1 = 4;

  TableName table_name = 5;

  As as = 6;

  LeftParenthesis left_parenthesis = 7;

  Alt2 alt2 = 8;

  ReturningClause returning_clause = 9;

  message With {
    RecursiveKeyword recursive_keyword = 1;

    repeated CommonTableExpression common_table_expression = 2;
  }

  message Alt1 {
    oneof value {
      ReplaceKeyword replace_keyword = 1;

      InsertKeyword insert_keyword = 2;

      InsertOr insert_or = 3;
    }

    message InsertOr {
      Alt1 alt1 = 1;

      message Alt1 {
        oneof value {
          AbortKeyword abort_keyword = 1;

          FailKeyword fail_keyword = 2;

          IgnoreKeyword ignore_keyword = 3;

          ReplaceKeyword replace_keyword = 4;

          RollbackKeyword rollback_keyword = 5;
        }
      }
    }
  }

  message Seq1 {
    SchemaName schema_name = 1;

    FullStopKeyword full_stop_keyword = 2;
  }

  message As {
    Alias alias = 1;
  }

  message LeftParenthesis {
    repeated ColumnName column_name = 1;

    RightParenthesisKeyword right_parenthesis_keyword = 2;
  }

  message Alt2 {
    oneof value {
      ValuesLeftParenthesis values_left_parenthesis = 1;

      Seq1 seq1 = 2;

      DefaultValues default_values = 3;
    }

    message ValuesLeftParenthesis {
      repeated Expr expr = 1;

      RightParenthesisKeyword right_parenthesis_keyword = 2;

      repeated CommaLeftParenthesis comma_left_parenthesis = 3;

      UpsertClause upsert_clause = 4;

      message CommaLeftParenthesis {
        repeated Expr expr = 1;

        RightParenthesisKeyword right_parenthesis_keyword = 2;
      }
    }

    message Seq1 {
      SelectStmt select_stmt = 1;

      UpsertClause upsert_clause = 2;
    }

    message DefaultValues {
    }
  }
}

message UpdateStmt {
  With with = 1;

  Alt1 alt1 = 2;

  QualifiedTableName qualified_table_name = 3;

  SetKeyword set_keyword = 4;

  Alt2 alt2 = 5;

  EqualsSignKeyword equals_sign_keyword = 6;

  Expr expr = 7;

  repeated Comma comma = 8;

  From from = 9;

  Where where = 10;

  ReturningClause returning_clause = 11;

  message With {
    RecursiveKeyword recursive_keyword = 1;

    repeated CommonTableExpression common_table_expression = 2;
  }

  message Alt1 {
    oneof value {
      UpdateKeyword update_keyword = 1;

      UpdateOr update_or = 2;
    }

    message UpdateOr {
      Alt1 alt1 = 1;

      message Alt1 {
        oneof value {
          AbortKeyword abort_keyword = 1;

          FailKeyword fail_keyword = 2;

          IgnoreKeyword ignore_keyword = 3;

          ReplaceKeyword replace_keyword = 4;

          RollbackKeyword rollback_keyword = 5;
        }
      }
    }
  }

  message Alt2 {
    oneof value {
      ColumnName column_name = 1;

      ColumnNameList column_name_list = 2;
    }
  }

  message Comma {
    Alt1 alt1 = 1;

    EqualsSignKeyword equals_sign_keyword = 2;

    Expr expr = 3;

    message Alt1 {
      oneof value {
        ColumnName column_name = 1;

        ColumnNameList column_name_list = 2;
      }
    }
  }

  message From {
    Alt1 alt1 = 1;

    message Alt1 {
      oneof value {
        Seq1 seq1 = 1;

        JoinClause join_clause = 2;
      }

      message Seq1 {
        repeated TableOrSubquery table_or_subquery = 1;
      }
    }
  }

  message Where {
    Expr expr = 1;
  }
}

message UpdateStmtLimited {
  With with = 1;

  Alt1 alt1 = 2;

  QualifiedTableName qualified_table_name = 3;

  SetKeyword set_keyword = 4;

  Alt2 alt2 = 5;

  EqualsSignKeyword equals_sign_keyword = 6;

  Expr expr = 7;

  repeated Comma comma = 8;

  From from = 9;

  Where where = 10;

  ReturningClause returning_clause = 11;

  OrderBy order_by = 12;

  LimitKeyword limit_keyword = 13;

  Expr expr_2 = 14;

  Alt3 alt3 = 15;

  message With {
    RecursiveKeyword recursive_keyword = 1;

    repeated CommonTableExpression common_table_expression = 2;
  }

  message Alt1 {
    oneof value {
      UpdateKeyword update_keyword = 1;

      UpdateOr update_or = 2;
    }

    message UpdateOr {
      Alt1 alt1 = 1;

      message Alt1 {
        oneof value {
          AbortKeyword abort_keyword = 1;

          FailKeyword fail_keyword = 2;

          IgnoreKeyword ignore_keyword = 3;

          ReplaceKeyword replace_keyword = 4;

          RollbackKeyword rollback_keyword = 5;
        }
      }
    }
  }

  message Alt2 {
    oneof value {
      ColumnName column_name = 1;

      ColumnNameList column_name_list = 2;
    }
  }

  message Comma {
    Alt1 alt1 = 1;

    EqualsSignKeyword equals_sign_keyword = 2;

    Expr expr = 3;

    message Alt1 {
      oneof value {
        ColumnName column_name = 1;

        ColumnNameList column_name_list = 2;
      }
    }
  }

  message From {
    Alt1 alt1 = 1;

    message Alt1 {
      oneof value {
        Seq1 seq1 = 1;

        JoinClause join_clause = 2;
      }

      message Seq1 {
        repeated TableOrSubquery table_or_subquery = 1;
      }
    }
  }

  message Where {
    Expr expr = 1;
  }

  message OrderBy {
    repeated OrderingTerm ordering_term = 1;
  }

  message Alt3 {
    oneof value {
      Offset offset = 1;

