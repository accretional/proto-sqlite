syntax = "proto3";

package sqlite;

import "sqlite.proto";

option go_package = "github.com/accretional/proto-sqlite/sqlite/pb;sqlitepb";

// Sqlite wraps an embedded sqlite3 binary over gRPC. The Query RPC
// accepts a typed SqlStmtList (the mechanically-derived CST) or, as a
// transitional escape hatch, a raw SQL string.
service Sqlite {
  rpc Query(QueryRequest) returns (QueryResponse);
}

message QueryRequest {
  // Optional Unix Domain Socket path to a running sqlited daemon. When
  // non-empty, the server forwards the rendered SQL over this UDS and
  // returns whatever the daemon produces; when empty, the server
  // executes against its own embedded sqlite3 + db. See
  // sqlite/cmd/sqlited for the daemon and sqlite/uds.go for the frame
  // protocol.
  string socket_uri = 1;
  oneof body {
    // Raw SQL — forwarded verbatim to sqlite3.
    string sql = 2;

    // Typed CST — server must render back to SQL text. Not yet
    // implemented; returns UNIMPLEMENTED until the SqlStmtList → SQL
    // printer lands.
    SqlStmtList stmts = 3;
  }

  // Optional path to a SQLite database file. Empty string uses the
  // embedded example.db. Accepts arbitrary filesystem paths — for
  // trusted callers only; no server-side allowlist is enforced.
  // Ignored when socket_uri is set (UDS daemons have a fixed db at
  // startup via --db).
  string db_path = 4;
}

message QueryResponse {
  repeated string column = 1;
  repeated Row row = 2;
}

message Row {
  repeated bytes cell      = 1;
  // cell_null[i] is true when cell[i] is SQL NULL. bytes fields cannot
  // represent nil vs empty-blob without this parallel signal.
  repeated bool  cell_null = 2;
}
